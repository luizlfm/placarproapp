<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Banner padrão PlacarPro">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="50%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#4a6580" />
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7CC61D" stop-opacity="0.18" />
      <stop offset="60%" stop-color="#7CC61D" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#7CC61D" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Fundo principal -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Pattern de grid sutil -->
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Spotlight central -->
  <rect width="1200" height="400" fill="url(#spotlight)" />

  <!-- Linhas decorativas do campo -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="none">
    <!-- Linha de meio-campo -->
    <line x1="600" y1="0" x2="600" y2="400" />
    <!-- Círculo central -->
    <circle cx="600" cy="200" r="70" />
    <circle cx="600" cy="200" r="3" fill="rgba(255,255,255,0.18)" />
    <!-- Áreas laterais -->
    <rect x="0" y="120" width="100" height="160" />
    <rect x="1100" y="120" width="100" height="160" />
  </g>

  <!-- Bola de futebol (estilizada, lado esquerdo) -->
  <g transform="translate(180,200)" opacity="0.18">
    <circle r="36" fill="#fff" />
    <g fill="#000000">
      <polygon points="-6,-14 6,-14 12,-4 6,8 -6,8 -12,-4" />
      <path d="M -6 -14 L -16 -22 M 6 -14 L 16 -22 M -12 -4 L -28 -4 M 12 -4 L 28 -4 M -6 8 L -10 22 M 6 8 L 10 22" stroke="#000000" stroke-width="2" fill="none" />
    </g>
  </g>

  <!-- Troféu (lado direito) -->
  <g transform="translate(1000,180)" opacity="0.22" fill="#7CC61D">
    <path d="M -28 -40 h 56 v 18 c 0 26 -12 44 -28 44 c -16 0 -28 -18 -28 -44 z" />
    <rect x="-6" y="22" width="12" height="14" />
    <rect x="-18" y="36" width="36" height="6" rx="2" />
  </g>

  <!-- Texto sutil "PLACARPRO" -->
  <text x="600" y="380" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="6" fill="rgba(255,255,255,0.22)">PLACARPRO</text>
</svg>
