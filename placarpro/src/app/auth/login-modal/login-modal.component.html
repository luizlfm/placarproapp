<ion-content class="bg">
  <div class="modal-card">
    <header class="head">
      <button class="close" type="button" (click)="dismiss()" aria-label="Fechar">
        <ion-icon name="close-outline"></ion-icon>
      </button>
      <h2>Login</h2>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form" novalidate>
      <label class="fld">
        <span class="lbl">Usuário</span>
        <input
          type="email"
          mask="email"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
          placeholder="seu@email.com"
        />
      </label>

      <label class="fld">
        <span class="lbl">Senha</span>
        <div class="senha-wrap">
          <input
            [type]="mostrarSenha ? 'text' : 'password'"
            formControlName="senha"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button
            type="button"
            class="toggle-senha"
            (click)="mostrarSenha = !mostrarSenha"
            [attr.aria-label]="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'"
          >
            <ion-icon [name]="mostrarSenha ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </label>

      <div class="row-links">
        <button type="button" class="link" (click)="criarConta()">Criar nova conta</button>
        <button type="button" class="link" (click)="esqueciSenha()">Esqueci a senha</button>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="loading || form.invalid"
      >
        <ion-spinner *ngIf="loading" name="dots"></ion-spinner>
        <span *ngIf="!loading">Login</span>
      </button>

      <div class="separator"><span>ou</span></div>

      <button
        type="button"
        class="btn-google"
        (click)="loginGoogle()"
        [disabled]="loadingGoogle"
      >
        <svg width="20" height="20" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.59.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.547 0 9c0 1.453.348 2.825.957 4.039l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
        </svg>
        <span *ngIf="!loadingGoogle">Entrar com Google</span>
        <ion-spinner *ngIf="loadingGoogle" name="dots"></ion-spinner>
      </button>
    </form>

    <footer class="foot">
      <a routerLink="/" (click)="dismiss()">Termos e condições de uso</a>
      <a routerLink="/" (click)="dismiss()">Política de privacidade</a>
    </footer>
  </div>
</ion-content>
