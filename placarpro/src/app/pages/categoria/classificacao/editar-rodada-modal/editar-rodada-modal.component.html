<div class="dialog">
  <h2 class="titulo">Editar Rodada</h2>

  <div class="campo">
    <label>Título</label>
    <input
      type="text"
      class="ipt"
      [(ngModel)]="titulo"
      [placeholder]="placeholderTitulo"
      maxlength="60"
    />
  </div>

  <label class="check-row">
    <input type="checkbox" [(ngModel)]="oculta" />
    <span>Ocultar jogos da rodada para os seguidores</span>
  </label>

  <label class="check-row">
    <input type="checkbox" [(ngModel)]="permiteEnvioResultados" />
    <span>
      Permitir que os usuários enviem resultados
      <small>Publicado após aprovação</small>
    </span>
  </label>

  <div class="acoes">
    <button type="button" class="btn-remover" (click)="remover()" [disabled]="loading">
      Remover
    </button>
    <div class="spacer"></div>
    <button type="button" class="btn-cancelar" (click)="dismiss()" [disabled]="loading">
      Cancelar
    </button>
    <button type="button" class="btn-salvar" (click)="salvar()" [disabled]="loading">
      Salvar
    </button>
  </div>
</div>
