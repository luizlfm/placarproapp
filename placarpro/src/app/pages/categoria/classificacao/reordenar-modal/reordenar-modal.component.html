<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Reordenar manualmente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg">
  <div class="wrap">
    <p class="hint">
      Use as setas pra organizar a ordem na tabela. Ao salvar, a classificação
      passa a usar essa ordem (em vez dos critérios).
    </p>

    <div class="lista">
      <div
        *ngFor="let eq of equipes; let i = index; let last = last; trackBy: trackById"
        class="row"
      >
        <span class="pos">{{ i + 1 }}</span>
        <div class="logo">
          <img *ngIf="eq.logoUrl; else iconF" [src]="eq.logoUrl" [alt]="eq.nome" />
          <ng-template #iconF><ion-icon name="shield-outline"></ion-icon></ng-template>
        </div>
        <span class="nome">{{ eq.nome }}</span>
        <div class="acts">
          <ion-button fill="clear" size="small" [disabled]="i === 0" (click)="mover(eq, -1)" aria-label="Subir">
            <ion-icon slot="icon-only" name="chevron-up-outline"></ion-icon>
          </ion-button>
          <ion-button fill="clear" size="small" [disabled]="last" (click)="mover(eq, 1)" aria-label="Descer">
            <ion-icon slot="icon-only" name="chevron-down-outline"></ion-icon>
          </ion-button>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="footer-actions">
      <ion-button fill="clear" color="medium" (click)="limparOrdem()" [disabled]="loading">
        Restaurar ordem natural
      </ion-button>
      <div class="spacer"></div>
      <ion-button color="primary" (click)="salvar()" [disabled]="loading">
        <ion-spinner *ngIf="loading" name="dots" slot="start"></ion-spinner>
        Salvar ordem
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
