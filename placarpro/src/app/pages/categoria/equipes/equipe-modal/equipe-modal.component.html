<!-- ════════ HEADER ════════
     Padrão Ionic igual ao jogador-modal: botão voltar à esquerda,
     título centralizado, compartilhar à direita (só em edição). -->
<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()" aria-label="Voltar">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ equipeExistente ? 'Editar equipe' : 'Nova equipe' }}</ion-title>
    <ion-buttons slot="end" *ngIf="equipeExistente">
      <ion-button (click)="compartilhar()" aria-label="Compartilhar">
        <ion-icon slot="icon-only" name="share-social-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="bg">
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="modal-card">

    <!-- ════════ BODY ════════ -->
    <div class="modal-body">

      <!-- Escudo + ações (foto em cima, texto + botões embaixo —
           mesmo padrão do jogador-modal). -->
      <section class="team-identity">
        <button type="button" class="logo-circle" (click)="selecionarLogo()" [disabled]="enviandoLogo"
          aria-label="Selecionar escudo">
          <img skel *ngIf="form.value.logoUrl; else iconF" [src]="form.value.logoUrl" alt="Logo" />
          <ng-template #iconF>
            <ion-icon name="shield-outline"></ion-icon>
          </ng-template>
          <span *ngIf="enviandoLogo" class="overlay">
            <ion-spinner color="light"></ion-spinner>
          </span>
        </button>

        <div class="logo-hint">
          <strong>Escudo da equipe</strong>
          <span>Imagem quadrada ou redonda</span>
          <div class="logo-actions">
            <ion-button size="small" color="primary" type="button" (click)="selecionarLogo()" [disabled]="enviandoLogo">
              <ion-icon slot="start" name="camera-outline"></ion-icon>
              {{ form.value.logoUrl ? 'Trocar' : 'Enviar' }}
            </ion-button>
            <ion-button *ngIf="form.value.logoUrl" size="small" color="danger" type="button"
              (click)="removerLogo()">
              <ion-icon slot="start" name="trash-outline"></ion-icon>
              Remover
            </ion-button>
          </div>
        </div>
      </section>

      <!-- Formulário identificação -->
      <div class="divider">
        <ion-item lines="none">
          <h3 class="divider-label">Informações básicas</h3>
        </ion-item>
        <ion-input
          fill="outline"
          label="Nome da equipe"
          labelPlacement="stacked"
          placeholder="Ex: Sport Club Recife"
          formControlName="nome"
          required
        ></ion-input>

        <ion-input
          fill="outline"
          label="Técnico"
          labelPlacement="stacked"
          placeholder="Ex: Tite"
          formControlName="tecnico"
        ></ion-input>

        <ion-input
          fill="outline"
          label="Cidade/UF"
          labelPlacement="stacked"
          placeholder="Ex: Formiga/MG"
          formControlName="cidade"
        ></ion-input>

        <ion-select
          fill="outline"
          label="Grupo"
          labelPlacement="stacked"
          formControlName="grupoId"
          interface="popover"
          placeholder="Sem grupo"
        >
          <ion-select-option value="">Sem grupo</ion-select-option>
          <ion-select-option *ngFor="let g of grupos$ | async" [value]="g.id">
            {{ g.nome }}
          </ion-select-option>
        </ion-select>

      </div>

      <!-- Gerenciar (nav cards) -->
      <div>
        <ion-item lines="none">
          <h3 class="divider-label">Gerenciar</h3>
        </ion-item> 
        
        <button type="button" class="nav-card" (click)="abrirJogadores()">
          <span class="nav-ic">
            <ion-icon name="people-outline"></ion-icon>
          </span>
          <span class="nav-text">
            <span class="nav-title">Jogadores</span>
            <span class="nav-sub">Elenco e numerações</span>
          </span>
          <ion-icon class="nav-chev" name="chevron-forward-outline"></ion-icon>
        </button>

        <button type="button" class="nav-card" (click)="abrirEquipeTecnica()">
          <span class="nav-ic">
            <ion-icon name="people-circle-outline"></ion-icon>
          </span>
          <span class="nav-text">
            <span class="nav-title">Equipe Técnica</span>
            <span class="nav-sub">Treinador, auxiliar, preparador</span>
          </span>
          <ion-icon class="nav-chev" name="chevron-forward-outline"></ion-icon>
        </button>

        <button *ngIf="equipeExistente?.inscricaoToken" type="button" class="nav-card nav-card--warning"
          (click)="reabrirFichaInscricao()">
          <span class="nav-ic">
            <ion-icon name="lock-open-outline"></ion-icon>
          </span>
          <span class="nav-text">
            <span class="nav-title">Reabrir ficha</span>
            <span class="nav-sub">Permitir representante editar de novo</span>
          </span>
          <ion-icon class="nav-chev" name="chevron-forward-outline"></ion-icon>
        </button>
      </div>

      <!-- Ações (Remover / Salvar) — antes ficavam num footer sticky.
           Agora vivem dentro do content, logo abaixo do "Reabrir ficha",
           e rolam junto com o conteúdo. -->
      <div class="form-actions">
        <button *ngIf="equipeExistente" type="button" class="btn btn-danger" (click)="remover()">
          <ion-icon name="trash-outline"></ion-icon>
          <span>Remover</span>
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
          <ion-spinner *ngIf="loading" name="dots"></ion-spinner>
          <ion-icon *ngIf="!loading" name="checkmark-outline"></ion-icon>
          <span>{{ equipeExistente ? 'Salvar' : 'Criar equipe' }}</span>
        </button>
      </div>
    </div>
  </form>
</ion-content>
