<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Editar informações</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg">
  <div class="modal-card">
    <form [formGroup]="form" (ngSubmit)="salvar()" class="form-group">

      <!-- ═══════════ Seção: PARTIDA ═══════════ -->
      <div class="form-section">
        <div class="form-section-head">
          <ion-icon name="football-outline"></ion-icon>
          <span>Dados da partida</span>
        </div>

        <ion-input
          fill="outline"
          label="Título"
          labelPlacement="stacked"
          formControlName="titulo"
          placeholder="Ex.: Decisão do título"
        ></ion-input>

        <!-- Data e Hora separadas — cada uma abre o ion-datetime picker
             em modal (mobile) / popover (desktop) via app-date-input. -->
        <div class="data-hora-row split">
          <app-date-input
            label="Data"
            mode="date"
            placeholder="dd/mm/aaaa"
            formControlName="data"
          ></app-date-input>
          <app-date-input
            label="Hora"
            mode="time"
            placeholder="hh:mm"
            formControlName="hora"
          ></app-date-input>
        </div>

        <ion-input
          fill="outline"
          label="Local"
          labelPlacement="stacked"
          formControlName="local"
          placeholder="Ex.: Ginásio Municipal"
        ></ion-input>
      </div>

      <!-- ═══════════ Seção: OUTROS ═══════════ -->
      <div class="form-section">
        <div class="form-section-head">
          <ion-icon name="document-text-outline"></ion-icon>
          <span>Comunicação</span>
        </div>

        <ion-textarea
          fill="outline"
          label="Aviso aos times/torcida"
          labelPlacement="stacked"
          formControlName="aviso"
          placeholder="Ex: Levar uniforme reserva. Portões abrem 30min antes."
          autoGrow="true"
          rows="3"
        ></ion-textarea>
      </div>
    </form>

    <div class="link-rows">
      <button type="button" class="link-row" (click)="abrirAnexos()">
        <ion-icon name="attach-outline"></ion-icon>
        <span>Anexos</span>
        <span class="badge" *ngIf="qtdAnexos() > 0">{{ qtdAnexos() }}</span>
      </button>
      <button type="button" class="link-row" (click)="abrirPontosExtras()">
        <ion-icon name="add-circle-outline"></ion-icon>
        <span>Pontos Extras</span>
        <span class="badge" *ngIf="(jogo.pontosExtras?.mandante || jogo.pontosExtras?.visitante)">
          {{ (jogo.pontosExtras?.mandante ? 1 : 0) + (jogo.pontosExtras?.visitante ? 1 : 0) }}
        </span>
      </button>
      <button type="button" class="link-row" (click)="abrirArbitragem()">
        <ion-icon name="person-outline"></ion-icon>
        <span>Arbitragem</span>
        <span class="badge" *ngIf="qtdArbitros() > 0">{{ qtdArbitros() }}</span>
      </button>
      <button type="button" class="link-row" (click)="abrirSumula()">
        <ion-icon name="document-text-outline"></ion-icon>
        <span>Súmula</span>
      </button>
      <button type="button" class="link-row" (click)="abrirArteDoJogo()">
        <ion-icon name="image-outline"></ion-icon>
        <span>Arte do Jogo</span>
      </button>
    </div>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <!-- Footer padronizado: Cancelar (vermelho) + Salvar (navy) em 2
         colunas de 50%, botões small com ícones. Mesmo padrão do Anexos. -->
    <div class="acoes-footer">
      <ion-button
        class="btn-acao"
        size="small"
        color="danger"
        (click)="dismiss()"
        [disabled]="salvando"
      >
        <ion-icon slot="start" name="trash-outline"></ion-icon>
        Cancelar
      </ion-button>
      <ion-button
        class="btn-acao"
        size="small"
        color="primary"
        (click)="salvar()"
        [disabled]="salvando"
      >
        <ion-spinner *ngIf="salvando" name="dots" slot="start"></ion-spinner>
        <ion-icon *ngIf="!salvando" slot="start" name="checkmark-outline"></ion-icon>
        Salvar
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
