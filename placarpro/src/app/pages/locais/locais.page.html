<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Locais de jogo</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="novo()" aria-label="Novo local">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wrap">
    <!-- Form (inline) -->
    <section class="card form-card" *ngIf="abrirForm" [formGroup]="form">
      <div class="form-head">
        <h3>{{ editandoId ? 'Editar local' : 'Novo local' }}</h3>
        <ion-button fill="clear" color="medium" (click)="fechar()" aria-label="Fechar">
          <ion-icon slot="icon-only" name="close-outline"></ion-icon>
        </ion-button>
      </div>

      <div class="field-group">
        <ion-input fill="outline" label="Nome do local" labelPlacement="stacked" placeholder="Ex: Ginásio Municipal" formControlName="nome" required></ion-input>
        <ion-input fill="outline" label="Endereço" labelPlacement="stacked" placeholder="Ex: Rua das Flores, 123" formControlName="endereco"></ion-input>
        <div class="row-2">
          <ion-input fill="outline" label="Cidade/UF" labelPlacement="stacked" placeholder="Ex: São Paulo / SP" formControlName="cidade"></ion-input>
          <ion-input fill="outline" label="Capacidade" labelPlacement="stacked" type="number" formControlName="capacidade"></ion-input>
        </div>
        <ion-textarea fill="outline" label="Observações" labelPlacement="stacked" placeholder="Ex: Estacionamento gratuito, vestiário com chuveiro" [autoGrow]="true" rows="2" formControlName="observacoes"></ion-textarea>
      </div>

      <ion-button expand="block" color="primary" (click)="salvar()" [disabled]="salvando" class="btn-save">
        Salvar
      </ion-button>
    </section>

    <!-- Lista -->
    <ng-container *ngIf="locais$ | async as lista">
      <div class="counter" *ngIf="lista.length > 0">{{ lista.length }} local(is)</div>

      <div class="lista-card" *ngIf="lista.length > 0; else empty">
        <div *ngFor="let l of lista; trackBy: trackById" class="local-row" (click)="editar(l)">
          <div class="ic"><ion-icon name="location-outline"></ion-icon></div>
          <div class="info">
            <div class="nome">{{ l.nome }}</div>
            <div class="meta">
              <span *ngIf="l.cidade">{{ l.cidade }}</span>
              <span *ngIf="l.cidade && l.endereco"> · </span>
              <span *ngIf="l.endereco">{{ l.endereco }}</span>
              <span *ngIf="l.capacidade"> · {{ l.capacidade }} lugares</span>
            </div>
          </div>
          <ion-button fill="clear" color="medium" (click)="remover(l, $event)" aria-label="Remover">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-button>
        </div>
      </div>

      <ng-template #empty>
        <div *ngIf="!abrirForm" class="empty">
          <ion-icon name="location-outline"></ion-icon>
          <h2>Nenhum local cadastrado</h2>
          <p>Cadastre ginásios, quadras e estádios para reutilizar em jogos.</p>
          <button class="empty-cta" type="button" (click)="novo()" aria-label="Novo local">
            <ion-icon name="add"></ion-icon>
            <span>Novo local</span>
          </button>
        </div>
      </ng-template>
    </ng-container>
  </div>
</ion-content>
