<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Seguindo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="wrap">
    <ng-container *ngIf="campeonatos$ | async as lista; else loading">
      <div *ngIf="lista.length === 0" class="empty">
        <ion-icon name="heart-outline"></ion-icon>
        <h2>Você ainda não segue nenhum campeonato</h2>
        <p>Quando você clicar em <strong>SEGUIR</strong> em um campeonato, ele aparece aqui.</p>
      </div>

      <div class="grid" *ngIf="lista.length > 0">
        <article
          *ngFor="let c of lista; trackBy: trackById"
          class="card camp-card"
          (click)="abrir(c)"
        >
          <div class="banner" [style.backgroundImage]="(c.capaUrl || c.bannerUrl) ? 'url(' + (c.capaUrl || c.bannerUrl) + ')' : null"></div>
          <div class="body">
            <div class="logo">
              <img *ngIf="c.logoUrl; else iconC" [src]="c.logoUrl" [alt]="c.titulo" loading="lazy" />
              <ng-template #iconC><ion-icon name="trophy-outline"></ion-icon></ng-template>
            </div>
            <div class="info">
              <h3>{{ c.titulo }}</h3>
              <p *ngIf="c.subtitulo">{{ c.subtitulo }}</p>
              <span class="seguidores">
                <ion-icon name="people-outline"></ion-icon>
                {{ c.seguidores ?? 0 }} seguidores
              </span>
            </div>
            <button class="btn-unfollow" type="button" (click)="deixarDeSeguir($event, c)" aria-label="Deixar de seguir">
              <ion-icon name="close"></ion-icon>
            </button>
          </div>
        </article>
      </div>
    </ng-container>

    <ng-template #loading>
      <div class="loading"><ion-spinner name="dots"></ion-spinner></div>
    </ng-template>
  </div>
</ion-content>
