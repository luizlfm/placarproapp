<ion-content [fullscreen]="true" class="auth-bg">
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <img
          src="assets/images/logo3.png"
          alt="PlacarPro"
          width="200"
          height="160"
          loading="eager"
          decoding="async"
          fetchpriority="high"
          onerror="this.onerror=null;this.src='assets/branding/logo-vertical.png';"
        />
        <p class="auth-tagline">
          Informe seu e-mail e enviaremos um link para criar uma nova senha.
        </p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate *ngIf="!sent">
        <div class="field-group">
          <ion-input
            fill="outline"
            label="E-mail"
            labelPlacement="stacked"
            placeholder="nome@email.com"
            type="email"
            inputmode="email"
            autocomplete="email"
            mask="email"
            formControlName="email"
            required
          ></ion-input>
        </div>

        <ion-button
          expand="block"
          type="submit"
          color="primary"
          class="auth-submit"
          [disabled]="loading"
        >
          Enviar link
        </ion-button>

        <p class="auth-footer">
          Lembrou a senha?
          <a routerLink="/login">Voltar ao login</a>
        </p>
      </form>

      <div *ngIf="sent" class="auth-sent">
        <ion-icon name="mail-outline" class="auth-sent-icon"></ion-icon>
        <h2>Pronto!</h2>
        <p>
          Se houver uma conta com este e-mail, você receberá em instantes um link
          para criar uma nova senha. Confira a caixa de spam se não chegar.
        </p>
        <ion-button expand="block" color="primary" class="auth-submit" routerLink="/login">
          Voltar ao login
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
