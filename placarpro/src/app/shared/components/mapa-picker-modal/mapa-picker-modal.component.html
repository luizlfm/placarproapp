<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Selecionar no mapa</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="mp-content" [scrollY]="false">
  <!-- Reusa o componente embeddable. Ele mesmo mostra os botões
       Cancelar/Confirmar no rodapé (exibirBotoes default true) e emite
       os eventos correspondentes — tratamos com dismiss(data). -->
  <app-mapa-picker
    [lat]="lat"
    [lng]="lng"
    [endereco]="endereco"
    [exibirBotoes]="true"
    (confirmar)="aoConfirmar($event)"
    (cancelar)="dismiss()"
  ></app-mapa-picker>
</ion-content>
