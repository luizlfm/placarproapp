<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ titulo }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg">
  <form [formGroup]="form" (ngSubmit)="salvar()" novalidate>

    <!-- ─── Equipes + Placar ────────────────────────────
         Layout muda conforme `modo`:
          - 'completo'    → mandante em cima / visitante embaixo + gols
          - 'informacoes' → bloco escondido (equipes ficam em "Selecionar
                            equipes", modal próprio)
          - 'resultado'   → tratado em outro componente -->
    <div
      *ngIf="modo !== 'informacoes'"
      class="placar-edit"
      [class.modo-resultado]="modo === 'resultado'"
    >
      <div class="equipe-row">
        <div class="badge-lado">Mandante</div>
        <div class="escudo">
          <img *ngIf="mandanteSelecionado?.logoUrl; else iconM" [src]="mandanteSelecionado!.logoUrl"
            [alt]="mandanteSelecionado!.nome" />
          <ng-template #iconM><ion-icon name="shield-outline"></ion-icon></ng-template>
        </div>
        <ion-select fill="outline" label="Equipe" labelPlacement="stacked" formControlName="mandanteId"
          interface="popover" class="select-equipe">
          <ion-select-option *ngFor="let e of equipes" [value]="e.id">{{ e.nome }}</ion-select-option>
        </ion-select>
        <ion-input *ngIf="mostrarPlacar" fill="outline" label="Gols" labelPlacement="stacked" type="number" min="0"
          formControlName="golsMandante" class="gols-input"></ion-input>
      </div>

      <div class="separador">
        <span class="linha"></span>
        <span class="vs">×</span>
        <span class="linha"></span>
      </div>

      <div class="equipe-row">
        <div class="badge-lado">Visitante</div>
        <div class="escudo">
          <img *ngIf="visitanteSelecionado?.logoUrl; else iconV" [src]="visitanteSelecionado!.logoUrl"
            [alt]="visitanteSelecionado!.nome" />
          <ng-template #iconV><ion-icon name="shield-outline"></ion-icon></ng-template>
        </div>
        <ion-select fill="outline" label="Equipe" labelPlacement="stacked" formControlName="visitanteId"
          interface="popover" class="select-equipe">
          <ion-select-option *ngFor="let e of equipes" [value]="e.id">{{ e.nome }}</ion-select-option>
        </ion-select>
        <ion-input *ngIf="mostrarPlacar" fill="outline" label="Gols" labelPlacement="stacked" type="number" min="0"
          formControlName="golsVisitante" class="gols-input"></ion-input>
      </div>
    </div>

    <!-- ─── Meta da partida ─────────────────────────────
         Em modo 'resultado' essa seção inteira some — só fica o placar. -->
    <div class="field-group" *ngIf="mostrarInformacoes">
      <div class="row-2">
        <ion-select fill="outline" label="Fase" labelPlacement="stacked" formControlName="fase"
          interface="popover" placeholder="Selecionar">
          <ion-select-option [value]="''">Sem fase</ion-select-option>
          <ion-select-option *ngFor="let f of fases" [value]="f.nome">{{ f.nome }}</ion-select-option>
        </ion-select>
        <ion-select fill="outline" label="Rodada" labelPlacement="stacked" formControlName="rodada"
          interface="popover" placeholder="Selecionar" class="rodada-input">
          <ion-select-option [value]="null">Sem rodada</ion-select-option>
          <ion-select-option *ngFor="let r of rodadasDisponiveis" [value]="r">{{ r }}ª rodada</ion-select-option>
        </ion-select>
      </div>

      <div class="data-hora-row">
        <ion-input fill="outline" label="Data e hora" labelPlacement="stacked" formControlName="dataHora"
          inputmode="numeric" placeholder="dd/mm/aaaa hh:mm" mask="datahora"></ion-input>
        <ion-icon class="ic-cal" name="calendar-outline"></ion-icon>
      </div>

      <ion-input fill="outline" label="Local" labelPlacement="stacked" placeholder="Ex.: Ginásio Municipal"
        formControlName="local"></ion-input>

      <!-- Status só aparece em modo 'completo' (novo jogo / editar jogo
           completo). Em 'informacoes' o status fica no modal de Editar
           resultado, onde faz mais sentido junto com o placar. -->
      <ion-select *ngIf="modo === 'completo'" fill="outline" label="Status" labelPlacement="stacked" formControlName="status" interface="popover">
        <ion-select-option value="agendado">Agendado</ion-select-option>
        <ion-select-option value="em-andamento">Em andamento</ion-select-option>
        <ion-select-option value="encerrado">Encerrado</ion-select-option>
        <ion-select-option value="cancelado">Cancelado</ion-select-option>
        <ion-select-option value="wo">W.O.</ion-select-option>
      </ion-select>
    </div>

    <!-- ─── Footer ─────────────────────────────────────── -->
      <!-- Footer:
           - 'completo'    → Remover + (Encerrar) + Salvar
           - 'resultado'   → (Encerrar) + Salvar  (sem Remover — só fluxo de placar)
           - 'informacoes' → Remover + Salvar -->
      <ion-row style="width: 100%;" class="ion-no-padding">
        <ion-col size="6" size-md="4" *ngIf="jogoExistente && modo !== 'resultado'">
          <ion-button class="buttons" color="danger" type="button" (click)="remover()">
            <ion-icon slot="start" name="trash-outline"></ion-icon>
            Remover
          </ion-button>
        </ion-col>
        <ion-col size="12" size-md="4" *ngIf="jogoExistente && form.value.status !== 'encerrado' && modo !== 'informacoes'">
          <ion-button class="buttons" color="success" type="button" (click)="encerrar()">
            <ion-icon slot="start" name="checkmark-done-outline"></ion-icon>
            Encerrar jogo
          </ion-button>
        </ion-col>
        <ion-col [size]="(jogoExistente && modo !== 'resultado') ? 6 : 12" size-md="4">
          <ion-button class="buttons" type="submit" color="primary" [disabled]="loading">
            <ion-icon slot="start" name="save-outline"></ion-icon>
            Salvar
          </ion-button>
        </ion-col>
      </ion-row>


  </form>
</ion-content>
