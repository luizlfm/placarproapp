<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">Cancelar</ion-button>
    </ion-buttons>
    <ion-title>Apoios e Patrocinadores</ion-title>
    <ion-buttons slot="end">
      <ion-button strong="true" [disabled]="salvando" (click)="salvar()">Salvar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="pat-content">
  <p class="pat-intro">Logos e links dos patrocinadores que aparecem no rodapé da página pública.</p>

  <ion-button expand="block" color="secondary" class="pat-add" (click)="adicionar()">
    <ion-icon slot="start" name="add-outline"></ion-icon>
    Adicionar patrocinador
  </ion-button>

  <div class="pat-lista" *ngIf="patrocinadores.length > 0; else vazio">
    <div class="pat-card" *ngFor="let p of patrocinadores; let i = index">
      <button type="button" class="pat-logo" (click)="acionarUploadLogo(i)">
        <img *ngIf="p.logoUrl; else iconePlaceholder" [src]="p.logoUrl" [alt]="p.nome" />
        <ng-template #iconePlaceholder>
          <ion-icon name="image-outline"></ion-icon>
          <span>Logo</span>
        </ng-template>
      </button>

      <div class="pat-campos">
        <input
          type="text"
          class="pat-input"
          [value]="p.nome"
          (input)="setNome(i, $any($event.target).value)"
          placeholder="Nome do patrocinador *"
        />
        <input
          type="url"
          class="pat-input"
          [value]="p.url || ''"
          (input)="setUrl(i, $any($event.target).value)"
          placeholder="Link do site (opcional) — https://..."
        />
      </div>

      <button type="button" class="pat-remove" (click)="remover(i)" aria-label="Remover">
        <ion-icon name="trash-outline"></ion-icon>
      </button>
    </div>
  </div>

  <ng-template #vazio>
    <div class="pat-empty">
      <ion-icon name="megaphone-outline"></ion-icon>
      <p>Nenhum patrocinador cadastrado.</p>
      <span>Toque em "Adicionar patrocinador" para começar.</span>
    </div>
  </ng-template>

  <input
    #logoPicker
    type="file"
    accept="image/*"
    style="display:none"
    (change)="onLogoEscolhida($event)"
  />
</ion-content>
