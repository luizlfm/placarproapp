<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Exibição</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="exib-content">
  <p class="exib-intro">Controle o que aparece na página pública do campeonato para os visitantes.</p>

  <div class="exib-card">
    <div class="exib-row">
      <div class="row-info">
        <ion-icon name="person-outline"></ion-icon>
        <div>
          <h4>Exibir nomes dos jogadores</h4>
          <p>Mostra os nomes nas escalações, rankings e estatísticas.</p>
        </div>
      </div>
      <ion-toggle [(ngModel)]="exibirNomes"></ion-toggle>
    </div>

    <div class="exib-row">
      <div class="row-info">
        <ion-icon name="calendar-outline"></ion-icon>
        <div>
          <h4>Exibir datas dos jogos</h4>
          <p>Mostra dia/horário das partidas (mantém só o placar caso desligue).</p>
        </div>
      </div>
      <ion-toggle [(ngModel)]="exibirDatas"></ion-toggle>
    </div>
  </div>
</ion-content>

<!-- Footer padronizado: Cancelar (vermelho lixeira) + Salvar (navy check)
     em 2 colunas de 50%, botões small em pill. Mesmo padrão do
     editar-informações, criar-noticia, critérios, anexos etc. -->
<ion-footer>
  <ion-toolbar>
    <div class="acoes-footer">
      <ion-button
        class="btn-acao"
        size="small"
        color="danger"
        (click)="dismiss()"
        [disabled]="salvando"
      >
        <ion-icon slot="start" name="trash-outline"></ion-icon>
        Cancelar
      </ion-button>
      <ion-button
        class="btn-acao"
        size="small"
        color="primary"
        (click)="salvar()"
        [disabled]="salvando"
      >
        <ion-spinner *ngIf="salvando" name="dots" slot="start"></ion-spinner>
        <ion-icon *ngIf="!salvando" slot="start" name="checkmark-outline"></ion-icon>
        Salvar
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
