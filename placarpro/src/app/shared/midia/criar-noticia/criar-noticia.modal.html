<ion-header class="cn-header ion-no-border">
  <ion-toolbar>
    <ion-title>{{ midia ? 'Editar notícia' : 'Criar notícia' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-shared">
  <form [formGroup]="form" class="form-grid" (ngSubmit)="salvar()">
    <h4 class="section-title">Capa</h4>
    <div class="capa-picker" (click)="escolherCapa()">
      <img *ngIf="capaUrl" [src]="capaUrl" alt="Capa" />
      <div class="placeholder" *ngIf="!capaUrl">
        <ion-icon name="image-outline"></ion-icon>
        <span>Clique para escolher uma imagem</span>
      </div>
      <button class="remover-capa" type="button" *ngIf="capaUrl" (click)="removerCapa($event)" aria-label="Remover capa">
        <ion-icon name="close"></ion-icon>
      </button>
    </div>
    <input
      #capaPicker
      type="file"
      accept="image/*"
      style="display:none"
      (change)="onCapaEscolhida($event)"
    />

    <h4 class="section-title">Conteúdo</h4>

    <ion-input
      fill="outline"
      label="Título *"
      labelPlacement="stacked"
      placeholder="Ex: Time da casa vence clássico nos pênaltis"
      formControlName="titulo"
      autocapitalize="sentences"
    ></ion-input>

    <ion-input
      fill="outline"
      label="Subtítulo"
      labelPlacement="stacked"
      placeholder="Ex: Decisão emocionante no estádio lotado"
      formControlName="subtitulo"
      autocapitalize="sentences"
    ></ion-input>

    <ion-textarea
      fill="outline"
      label="Texto *"
      labelPlacement="stacked"
      placeholder="Escreva aqui o corpo da notícia..."
      formControlName="corpo"
      [autoGrow]="true"
      rows="10"
    ></ion-textarea>
  </form>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <!-- Footer padronizado: Cancelar (vermelho lixeira) + Salvar (navy check)
         em 2 colunas de 50%, botões small em pill. Mesmo padrão do
         editar-informações, anexos, colunas-jogadores etc. -->
    <div class="acoes-footer">
      <ion-button
        class="btn-acao"
        size="small"
        color="danger"
        (click)="dismiss()"
      >
        <ion-icon slot="start" name="trash-outline"></ion-icon>
        Cancelar
      </ion-button>
      <ion-button
        class="btn-acao"
        size="small"
        color="primary"
        [disabled]="form.invalid"
        (click)="salvar()"
      >
        <ion-icon slot="start" name="checkmark-outline"></ion-icon>
        Salvar
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
