<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ editando ? 'Editar link' : 'Adicionar link' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-shared">
  <form [formGroup]="form" class="form-grid" (ngSubmit)="salvar()">
    <ion-input
      fill="outline"
      label="Título *"
      labelPlacement="stacked"
      placeholder="Ex: Reportagem sobre a final"
      formControlName="titulo"
      autocapitalize="sentences"
    ></ion-input>

    <ion-input
      fill="outline"
      label="URL *"
      labelPlacement="stacked"
      formControlName="url"
      type="url"
      inputmode="url"
      placeholder="https://..."
    ></ion-input>
    <small class="error-msg" *ngIf="form.controls.url.touched && form.controls.url.invalid">
      Informe uma URL começando com http:// ou https://
    </small>

    <ion-textarea
      fill="outline"
      label="Descrição (opcional)"
      labelPlacement="stacked"
      placeholder="Ex: Matéria publicada no portal local"
      formControlName="descricao"
      [autoGrow]="true"
      rows="3"
    ></ion-textarea>
  </form>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <!-- Footer padronizado: Cancelar (vermelho lixeira) + Salvar (navy check)
         em 2 colunas de 50%, botões small em pill. Mesmo padrão do
         editar-informações, anexos, colunas-jogadores etc. -->
    <div class="acoes-footer">
      <ion-button
        class="btn-acao"
        size="small"
        color="danger"
        (click)="dismiss()"
      >
        <ion-icon slot="start" name="trash-outline"></ion-icon>
        Cancelar
      </ion-button>
      <ion-button
        class="btn-acao"
        size="small"
        color="primary"
        [disabled]="form.invalid"
        (click)="salvar()"
      >
        <ion-icon slot="start" name="checkmark-outline"></ion-icon>
        Salvar
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
