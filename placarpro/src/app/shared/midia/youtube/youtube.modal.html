<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ editando ? 'Editar vídeo do YouTube' : 'Adicionar do YouTube' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" aria-label="Fechar">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-shared">
  <form [formGroup]="form" class="form-grid" (ngSubmit)="salvar()">
    <ion-input
      fill="outline"
      label="URL do vídeo *"
      labelPlacement="stacked"
      formControlName="url"
      type="url"
      inputmode="url"
      placeholder="https://youtu.be/..."
    ></ion-input>
    <small class="error-msg" *ngIf="form.controls.url.touched && form.controls.url.value && !youtubeId">
      Não foi possível identificar o vídeo. Cole a URL completa do YouTube.
    </small>

    <!-- Preview: thumbnail estática (não captura scroll como o iframe fazia).
         Click abre o vídeo em nova aba pra quem quiser conferir antes de salvar. -->
    <button
      type="button"
      class="yt-preview yt-preview-thumb"
      *ngIf="thumbUrl as src"
      (click)="abrirVideo()"
      aria-label="Abrir vídeo no YouTube"
    >
      <img [src]="src" alt="Pré-visualização do vídeo" />
      <span class="yt-play">
        <ion-icon name="play"></ion-icon>
      </span>
    </button>

    <ion-input
      fill="outline"
      label="Título *"
      labelPlacement="stacked"
      placeholder="Ex: Gol de placa na semifinal"
      formControlName="titulo"
      autocapitalize="sentences"
    ></ion-input>

    <ion-textarea
      fill="outline"
      label="Descrição (opcional)"
      labelPlacement="stacked"
      placeholder="Ex: Lance comentado pela narração oficial"
      formControlName="descricao"
      [autoGrow]="true"
      rows="3"
    ></ion-textarea>
  </form>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="acoes-footer">
      <ion-button
        class="btn-acao"
        size="small"
        color="danger"
        (click)="dismiss()"
      >
        <ion-icon slot="start" name="trash-outline"></ion-icon>
        Cancelar
      </ion-button>
      <ion-button
        class="btn-acao"
        size="small"
        color="primary"
        [disabled]="form.invalid || !youtubeId"
        (click)="salvar()"
      >
        <ion-icon slot="start" name="checkmark-outline"></ion-icon>
        Salvar
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
