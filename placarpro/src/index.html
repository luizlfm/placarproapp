<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8"/>
  <title>PlacarPro</title>

  <base href="/"/>

  <meta name="description" content="Organize campeonatos esportivos com facilidade."/>
  <meta name="theme-color" content="#1C2E3D"/>
  <meta name="color-scheme" content="light"/>
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="format-detection" content="telephone=no"/>
  <meta name="msapplication-tap-highlight" content="no"/>

  <!-- Favicon: usa logo.svg (escalável e nítido em qualquer resolução). -->
  <link rel="icon" type="image/svg+xml" href="assets/icon/logo.svg"/>
  <!-- Fallback PNG pra browsers que não suportam SVG favicon (iOS Safari antigo). -->
  <link rel="shortcut icon" type="image/png" href="assets/images/logo3.png"/>
  <link rel="apple-touch-icon" href="assets/images/logo3.png"/>

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PlacarPro"/>
  <link rel="manifest" href="manifest.webmanifest">
</head>

<body>
  <app-root></app-root>
  <noscript>Habilite JavaScript para usar o PlacarPro.</noscript>
</body>

</html>
